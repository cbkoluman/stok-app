<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barkod Test</title>
<style>
body{background:#111;color:#fff;font-family:monospace;padding:20px;font-size:14px}
button{background:#e8ff4a;color:#000;border:none;padding:12px 20px;border-radius:6px;font-size:14px;margin:8px 0;width:100%;cursor:pointer;font-weight:bold}
.result{background:#222;border:1px solid #333;padding:12px;border-radius:6px;margin:8px 0;word-break:break-all}
.ok{color:#4aff8a}.err{color:#ff4a4a}.info{color:#ffb84a}
video{width:100%;border-radius:6px;margin:8px 0;display:none}
</style>
</head>
<body>
<h2>Barkod API Test</h2>

<div class="result">
<div>UserAgent: <span class="info" id="ua"></span></div>
<div>BarcodeDetector: <span id="bd"></span></div>
<div>getUserMedia: <span id="gum"></span></div>
</div>

<button onclick="testDetector()">BarcodeDetector formatları listele</button>
<button onclick="testVideo()">Video stream aç</button>
<button onclick="testScan()">Video + canlı tarama başlat</button>
<button onclick="testFile()">Fotoğraf çek + analiz et</button>

<video id="video" autoplay playsinline></video>
<div id="log"></div>

<script>
const log = (msg, cls='info') => {
  document.getElementById('log').innerHTML += `<div class="result ${cls}">${msg}</div>`;
};

document.getElementById('ua').textContent = navigator.userAgent.slice(0,80);
document.getElementById('bd').innerHTML = 'BarcodeDetector' in window 
  ? '<span class="ok">VAR</span>' : '<span class="err">YOK</span>';
document.getElementById('gum').innerHTML = navigator.mediaDevices?.getUserMedia 
  ? '<span class="ok">VAR</span>' : '<span class="err">YOK</span>';

async function testDetector() {
  if (!('BarcodeDetector' in window)) { log('BarcodeDetector yok!', 'err'); return; }
  const formats = await BarcodeDetector.getSupportedFormats();
  log('Desteklenen formatlar: ' + formats.join(', '), 'ok');
}

async function testVideo() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v = document.getElementById('video');
    v.style.display = 'block';
    v.srcObject = stream;
    await v.play();
    log('Video açıldı: ' + v.videoWidth + 'x' + v.videoHeight, 'ok');
    setTimeout(() => log('Video boyut: ' + v.videoWidth + 'x' + v.videoHeight, 'ok'), 1000);
  } catch(e) { log('Video hatası: ' + e.message, 'err'); }
}

async function testScan() {
  if (!('BarcodeDetector' in window)) { log('BarcodeDetector yok!', 'err'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment', width:{ideal:1920}, height:{ideal:1080}}
    });
    const v = document.getElementById('video');
    v.style.display = 'block';
    v.srcObject = stream;
    await v.play();
    log('Tarama başladı — barkodu kameraya göster...', 'info');

    const detector = new BarcodeDetector({formats: await BarcodeDetector.getSupportedFormats()});
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    let count = 0;

    const interval = setInterval(async () => {
      count++;
      if (!v.videoWidth) return;
      canvas.width = v.videoWidth;
      canvas.height = v.videoHeight;
      ctx.drawImage(v, 0, 0);
      try {
        const codes = await detector.detect(canvas);
        if (codes.length > 0) {
          clearInterval(interval);
          stream.getTracks().forEach(t=>t.stop());
          v.style.display = 'none';
          log('BARKOD BULUNDU: ' + codes[0].rawValue + ' (' + codes[0].format + ')', 'ok');
        } else if (count % 10 === 0) {
          log('Taranıyor... (' + count + ' frame)', 'info');
        }
      } catch(e) { log('Detect hatası: ' + e.message, 'err'); clearInterval(interval); }
    }, 100);

    setTimeout(() => { clearInterval(interval); log('30sn timeout', 'err'); }, 30000);
  } catch(e) { log('Hata: ' + e.message, 'err'); }
}

async function testFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    log('Dosya: ' + file.name + ' (' + file.size + ' byte)', 'info');
    if (!('BarcodeDetector' in window)) { log('BarcodeDetector yok!', 'err'); return; }
    try {
      const detector = new BarcodeDetector({formats: await BarcodeDetector.getSupportedFormats()});
      const img = await createImageBitmap(file);
      log('Resim: ' + img.width + 'x' + img.height, 'info');
      const codes = await detector.detect(img);
      if (codes.length > 0) {
        log('BARKOD: ' + codes[0].rawValue + ' (' + codes[0].format + ')', 'ok');
      } else {
        log('Barkod bulunamadı', 'err');
      }
    } catch(e) { log('Hata: ' + e.message, 'err'); }
  };
  input.click();
}
</script>
</body>
</html>
